<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外国人健診受入れ準備：各部門課題管理表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  background: #fdf7f5; color: #3d2b35; min-height: 100vh; font-size: 16px;
}

/* ── HEADER ─────────────────────────────── */
header {
  background: linear-gradient(135deg, #8c3a52 0%, #b05a72 100%);
  color: white; padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  box-shadow: 0 3px 10px rgba(140,58,82,0.28);
}
header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.03em; }
header p  { font-size: 0.8rem; opacity: 0.82; margin-top: 3px; }
.header-btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.hbtn {
  padding: 7px 16px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.55); background: transparent; color: white;
  font-size: 0.82rem; cursor: pointer; transition: all 0.18s;
  white-space: nowrap; font-family: inherit; font-weight: 500;
}
.hbtn:hover { background: rgba(255,255,255,0.18); }
.hbtn.active { background: white; color: #8c3a52; border-color: white; font-weight: 700; }

/* ── TABS ───────────────────────────────── */
.tab-bar { display: flex; background: #7d3349; padding: 0 28px; gap: 4px; }
.tab-btn {
  padding: 10px 22px; border: none; background: transparent;
  color: rgba(255,255,255,0.55); font-size: 0.9rem; font-weight: 500;
  cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.18s;
  font-family: inherit; letter-spacing: 0.02em;
}
.tab-btn:hover { color: rgba(255,255,255,0.9); }
.tab-btn.active { color: white; border-bottom-color: #f9b8c8; font-weight: 700; }
/* ── UNDO / REDO バー ─ */
.undo-bar {
  display: none; align-items: center; gap: 6px;
  padding: 5px 16px; background: #fdf6f8; border-bottom: 1px solid #f0dce4;
}
.tab-panel.active ~ #undo-bar-sw,
#undo-bar-sw.show { display: flex; }
.undo-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 13px; border: 1px solid #d8b8c4; border-radius: 5px;
  background: white; cursor: pointer; font-size: 0.82rem; color: #6a3a52;
  font-family: inherit; transition: background 0.12s;
}
.undo-btn:hover:not(:disabled) { background: #fdeef5; border-color: #c07090; }
.undo-btn:disabled { opacity: 0.28; cursor: default; }
.undo-sep { color: #ccc; font-size: 0.75rem; margin: 0 2px; }

/* ── PAGE ───────────────────────────────── */
.page { padding: 20px 24px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── SWIMLANE WRAP (scroll) ─────────────── */
.swimlane-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 230px);
  border-radius: 12px;
  border: 1px solid #f0dde3;
  box-shadow: 0 2px 14px rgba(140,58,82,0.1);
}
.swimlane {
  table-layout: fixed; width: 100%; min-width: 700px; border-collapse: collapse;
}
/* Sticky phase header */
.phase-header th {
  position: sticky; top: 0; z-index: 2;
  padding: 12px 8px; font-size: 0.9rem; font-weight: 700;
  text-align: center; border: 1px solid rgba(255,255,255,0.25);
  color: white; letter-spacing: 0.03em; line-height: 1.5;
}
.col-lane-th {
  position: sticky; left: 0; z-index: 4;
  width: 90px; background: #5a3a44; color: white !important;
}
.ph-0 { background: #c97080; }
.ph-1 { background: #c4906a; }
.ph-2 { background: #8b7ab8; }
.ph-3 { background: #6a9e7a; }
.ph-4 { background: #5b9aaa; }

.lane-row td { border: 1px solid #f2e0e5; vertical-align: top; padding: 0; }
.lane-label {
  position: sticky; left: 0; z-index: 1;
  background: #5a3a44 !important; color: white !important; text-align: center;
  font-size: 0.82rem; font-weight: 700; padding: 10px 5px;
  width: 90px; min-width: 90px; line-height: 1.6; letter-spacing: 0.04em;
}
.lane-label .lane-icon { font-size: 1.15rem; display: block; margin-bottom: 4px; }
/* process-box drag */
.process-box { cursor: default; }
.proc-grab {
  display: inline-block; margin-right: 5px; cursor: grab;
  color: rgba(100,60,70,0.35); font-size: 0.85rem; user-select: none;
  pointer-events: none; /* ドラッグは process-box 側で受け取る */
}
.proc-label { pointer-events: none; } /* テキスト部分はイベントを親へ透過 */
.process-box.dragging { opacity: 0.35; outline: 2px dashed rgba(100,60,70,0.4); }
.process-box.drag-over { outline: 2px solid #6aaf8a; background-color: #efffef !important; }

/* ── LANE COLORS（セル・プロセスボックス・空きエリアを部門色で統一） ── */
.lane-row[data-lc="0"] td,
.lane-row[data-lc="0"] .cell { background: #fdf8f5; }
.lane-row[data-lc="1"] td,
.lane-row[data-lc="1"] .cell { background: #fdeef5; }
.lane-row[data-lc="2"] td,
.lane-row[data-lc="2"] .cell { background: #f0edfb; }
.lane-row[data-lc="3"] td,
.lane-row[data-lc="3"] .cell { background: #edf7ef; }
.lane-row[data-lc="4"] td,
.lane-row[data-lc="4"] .cell { background: #fef3e8; }
.lane-row[data-lc="5"] td,
.lane-row[data-lc="5"] .cell { background: #e8f4f8; }
.lane-row[data-lc="6"] td,
.lane-row[data-lc="6"] .cell { background: #fdf5e8; }

.cell { min-height: 110px; padding: 10px; transition: background 0.14s; position: relative; }

/* ── PROCESS BOX（背景なし＝セルの部門色がそのまま表示） ─────── */
.process-box {
  border-radius: 8px; padding: 8px 11px; font-size: 0.88rem;
  line-height: 1.55; color: #3d2b35; font-weight: 500;
  background: transparent;
  border: none; border-left: 4px solid rgba(100,60,70,0.2);
  position: relative; transition: padding-right 0.15s;
}
body.proc-mode .process-box { padding-right: 22px; }
/* 部門別の背景色・左ボーダー（部門ラベルと統一） */
.lane-row[data-lc="0"] .process-box { background: #fdf2ec; border-left-color: #d4937a; }
.lane-row[data-lc="1"] .process-box { background: #fbe4f0; border-left-color: #c87098; }
.lane-row[data-lc="2"] .process-box { background: #e8e4f8; border-left-color: #8870c8; }
.lane-row[data-lc="3"] .process-box { background: #e4f4e6; border-left-color: #5a9e6a; }
.lane-row[data-lc="4"] .process-box { background: #fceadb; border-left-color: #c88050; }
.lane-row[data-lc="5"] .process-box { background: #daeef6; border-left-color: #4a8ead; }
.lane-row[data-lc="6"] .process-box { background: #faeddb; border-left-color: #c8904a; }
.proc-0,.proc-1,.proc-2,.proc-3,.proc-4 {}

.proc-del-btn {
  display: none; position: absolute; top: 4px; right: 5px;
  background: none; border: none; color: #c97080; font-size: 0.72rem;
  cursor: pointer; padding: 0; line-height: 1; font-family: inherit; font-weight: 700;
}
body.proc-mode .proc-del-btn { display: block; }
body.proc-mode .proc-del-btn:hover { color: #8c3a52; }

.proc-arrow { text-align: center; color: #c0909a; font-size: 0.84rem; margin: 3px 0; user-select: none; }

/* ── EXAM CELL（横並びレイアウト） ──────────── */
.exam-group { margin-bottom: 10px; }
.exam-group-name {
  font-size: 0.72rem; font-weight: 700; color: #5a3a44;
  background: rgba(140,58,82,0.1); border-radius: 4px;
  padding: 2px 7px; display: inline-block; margin-bottom: 5px;
}
.exam-steps {
  display: flex; flex-wrap: wrap; align-items: flex-start; gap: 4px;
}
.exam-steps .process-box { display: inline-block; min-width: 80px; }
.proc-arrow-h {
  color: #c0909a; font-size: 1rem; align-self: center;
  flex-shrink: 0; padding: 0 2px; user-select: none;
}

/* ── ISSUE CHIPS ────────────────────────── */
.issue-chip {
  display: flex; align-items: flex-start; gap: 5px; border-radius: 8px;
  padding: 6px 9px; font-size: 0.82rem; color: #3d2b35; margin-top: 5px;
  cursor: pointer; transition: filter 0.12s; line-height: 1.45; border: 1px solid transparent;
}
.issue-chip:hover { filter: brightness(0.95); }
.chip-cat {
  display: inline-block; font-size: 0.65rem; font-weight: 700;
  border-radius: 4px; padding: 1px 5px; flex-shrink: 0; margin-top: 1px; color: white;
}
.cat-lang   { background: #fef9c3; border-color: #fde047; }
.cat-lang   .chip-cat { background: #c4920c; }
.cat-flow   { background: #fde8f0; border-color: #f4a8c8; }
.cat-flow   .chip-cat { background: #c97080; }
.cat-system { background: #f3e8ff; border-color: #d8b4fe; }
.cat-system .chip-cat { background: #9060c8; }
.cat-other  { background: #f0f0f0; border-color: #c8c8c8; }
.cat-other  .chip-cat { background: #708090; }
.issue-chip.status-done { opacity: 0.52; }
.issue-chip.status-done .issue-text { text-decoration: line-through; text-decoration-color: #8c3a52; }
body:not(.issue-mode) .issue-chip { pointer-events: none; }

/* ── ADD BUTTONS ────────────────────────── */
.add-proc-btn, .add-issue-btn {
  width: 100%; padding: 5px 0; border-radius: 8px; background: none;
  font-size: 0.75rem; cursor: pointer; transition: all 0.14s;
  margin-top: 5px; display: none; font-family: inherit;
}
.add-proc-btn  { border: 1.5px dashed #e8c8d0; color: #c8a0a8; }
.add-issue-btn { border: 1.5px dashed #f0c8d0; color: #d090a0; }
body.proc-mode  .add-proc-btn  { display: block; }
body.issue-mode .add-issue-btn { display: block; }
body.proc-mode  .add-proc-btn:hover  { border-color:#c97080;color:#8c3a52;background:#fdf0f3; }
body.issue-mode .add-issue-btn:hover { border-color:#c97080;color:#8c3a52;background:#fdf0f3; }

/* ── LEGEND ─────────────────────────────── */
.legend {
  margin-top: 14px; background: white; border-radius: 12px; padding: 12px 20px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  box-shadow: 0 1px 6px rgba(140,58,82,0.08); border: 1px solid #f0dde3;
}
.legend-lbl  { font-size: 0.78rem; font-weight: 700; color: #8c6070; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.76rem; color: #5a4050; }
.legend-dot  { width: 11px; height: 11px; border-radius: 3px; }

/* ── MGMT TABLE ─────────────────────────── */
.mgmt-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; flex-wrap: wrap; gap: 10px;
}
.mgmt-header h2 { font-size: 1.05rem; font-weight: 700; color: #5a2a3a; }
.mgmt-summary {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: white; border: 1px solid #f0dde3; border-radius: 10px;
  padding: 8px 16px; margin-bottom: 12px; font-size: 0.85rem; color: #5a2a3a;
}
.mgmt-summary .sum-total { font-weight: 700; color: #5a2a3a; }
.mgmt-summary .sum-sep { color: #d8c0c8; }
.sum-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600; padding: 2px 10px; border-radius: 20px; font-size: 0.82rem;
}
.sum-open     { background: #fef3e8; color: #b07030; }
.sum-progress { background: #e8f4ff; color: #3070b0; }
.sum-done     { background: #edf7ef; color: #3a8a4a; }

.table-wrap {
  overflow-x: auto;
  overflow-y: auto;
  max-height: calc(100vh - 235px);
  border-radius: 12px;
  border: 1px solid #f0dde3;
  box-shadow: 0 2px 14px rgba(140,58,82,0.1);
}
.mgmt-table {
  width: 100%; border-collapse: collapse; background: white;
  min-width: 976px; table-layout: fixed; /* 90+100+100+96+360+130+100 */
}

/* Column widths via colgroup */
.mgmt-table .cw-tim  { width: 90px;  }
.mgmt-table .cw-gym  { width: 100px; }
.mgmt-table .cw-rel  { width: 100px; }
.mgmt-table .cw-cat  { width: 96px;  }
.mgmt-table .cw-det  { width: 360px; }
.mgmt-table .cw-dep  { width: 130px; }
.mgmt-table .cw-st   { width: 100px; }

/* 対応部署 多重選択ボタン */
.dept-btn {
  width: 100%; background: #fdf7f9; border: 1.5px solid #f0dde3;
  border-radius: 7px; padding: 5px 8px; font-size: 0.82rem;
  font-family: inherit; color: #3d2b35; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; gap: 4px;
  text-align: left; min-height: 32px;
}
.dept-btn:hover { border-color: #c97080; }
.dept-cell-val { flex: 1; line-height: 1.4; word-break: break-all; }
/* 対応部署ピッカー */
#dept-picker {
  display: none; position: fixed; background: white;
  border: 1.5px solid #f0dde3; border-radius: 10px; padding: 8px 6px 6px;
  box-shadow: 0 6px 24px rgba(140,58,82,0.16); z-index: 600; min-width: 150px;
}
.dept-picker-item {
  display: flex; align-items: center; gap: 7px; padding: 5px 8px;
  cursor: pointer; font-size: 0.84rem; border-radius: 6px; user-select: none;
}
.dept-picker-item:hover { background: #fdf0f3; }
.dept-picker-item input { cursor: pointer; accent-color: #c97080; }
#dept-picker-close {
  width: 100%; margin-top: 6px; padding: 5px; border: none;
  background: #f8eef0; color: #8c3a52; font-size: 0.8rem;
  border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 600;
}
#dept-picker-close:hover { background: #f0dde3; }

/* Sticky header */
.mgmt-table thead th {
  position: sticky; top: 0; z-index: 4;
  background: #f8eef0; color: #5a2a3a;
  padding: 0; border-right: 1px solid #f0dde3; border-bottom: 2px solid #e8c0cc;
  vertical-align: top;
}
/* Th inner layout (label + filter fused) */
.th-inner {
  display: flex; flex-direction: column; gap: 5px;
  padding: 10px 10px 8px; min-height: 66px;
}
.th-title {
  font-size: 0.9rem; font-weight: 700; white-space: nowrap;
  color: #5a2a3a; letter-spacing: 0.02em;
}
.filter-sel, .filter-inp {
  width: 100%; padding: 4px 7px;
  border: 1.5px solid #f0d8dc; border-radius: 6px;
  font-size: 0.78rem; font-family: inherit; background: white; color: #3d2b35;
}
.filter-sel:focus, .filter-inp:focus { outline: none; border-color: #c97080; }

/* Frozen columns (No, タイミング, 部署, 課題) */
.mgmt-table th.fc, .mgmt-table td.fc { position: sticky; z-index: 2; }
.mgmt-table thead th.fc { z-index: 5; }
.fc-0 { left: 0px;   }
.fc-1 { left: 90px;  }
.fc-2 { left: 190px; }
/* Visual separator after frozen area */
.mgmt-table th.fc-2, .mgmt-table td.fc-2 {
  box-shadow: 4px 0 8px -2px rgba(140,58,82,0.18);
}
/* Frozen cell backgrounds (must be explicit for sticky to work over scrolled content) */
.mgmt-table tbody td.fc       { background: white; }
.mgmt-table tbody tr:nth-child(even) td.fc { background: #fef9f8; }
.mgmt-table tbody tr:hover td.fc     { background: #fdf5f7 !important; }
.mgmt-table tbody tr.status-done td.fc     { background: #f9f9f9 !important; }
/* Non-frozen cells */
.mgmt-table tbody td { padding: 9px 10px; font-size: 0.9rem; vertical-align: middle; border-right: 1px solid #f5eaec; }
.mgmt-table tbody tr { border-bottom: 1px solid #f5e8ea; transition: background 0.1s; }
.mgmt-table tbody tr:nth-child(even) td     { background: #fef9f8; }
.mgmt-table tbody tr:hover         td       { background: #fdf5f7 !important; }
.mgmt-table tbody tr.status-done   td       { background: #f9f9f9 !important; }

.col-no  { text-align: center; color: #a07080; font-weight: 700; }
.col-ops { text-align: center; }

.cat-badge {
  display: inline-block; font-size: 0.9rem; font-weight: 700;
  border-radius: 5px; padding: 3px 10px; color: white; white-space: nowrap;
}
.badge-lang   { background: #c4920c; }
.badge-flow   { background: #c97080; }
.badge-system { background: #9060c8; }
.badge-other  { background: #708090; }

.mgmt-sel, .mgmt-inp {
  width: 100%; border: 1.5px solid #f0dde3; border-radius: 7px;
  padding: 5px 8px; font-size: 0.86rem; font-family: inherit; color: #3d2b35; background: #fdf7f9;
}
.mgmt-sel:focus, .mgmt-inp:focus { outline: none; border-color: #c97080; }
.mgmt-edit-btn, .mgmt-del-btn { background:none; border:none; cursor:pointer; font-size:0.92rem; padding:2px 3px; }
.mgmt-del-btn:hover { opacity: 0.7; }

/* ── MODAL ──────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(61,43,53,0.48); z-index: 200;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }

/* ── LOADING ────────────────────────────── */
#loading-overlay {
  display: flex; position: fixed; inset: 0;
  background: rgba(253,247,245,0.92); z-index: 999;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; font-size: 1rem; color: #8c3a52; font-weight: 600;
}
#loading-overlay.hidden { display: none; }
.spinner {
  width: 38px; height: 38px; border-radius: 50%;
  border: 4px solid #f0dde3; border-top-color: #b05a72;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#api-error {
  display: none; background: #fde8ec; color: #8c2a3a;
  border: 1px solid #f0b0b8; border-radius: 10px;
  padding: 12px 20px; margin: 16px 24px; font-size: 0.9rem; text-align: center;
}
#api-error.show { display: block; }

/* ── SAVE STATUS INDICATOR ──────────────────── */
#save-status {
  font-size: 0.78rem; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; transition: opacity 0.3s; opacity: 0;
  white-space: nowrap;
}
#save-status.saving { opacity:1; background: #fef3e8; color: #b07030; }
#save-status.saved  { opacity:1; background: #edf7ef; color: #3a8a4a; }
#save-status.error  { opacity:1; background: #fde8ec; color: #8c2a3a; }

/* ── CONFLICT DIALOG ────────────────────────── */
#conflict-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(61,43,53,0.55); z-index: 300;
  align-items: center; justify-content: center;
}
#conflict-overlay.open { display: flex; }
#conflict-box {
  background: white; border-radius: 18px; padding: 28px 32px;
  max-width: 520px; width: 92%; box-shadow: 0 8px 32px rgba(140,58,82,0.22);
}
#conflict-box h3 { font-size: 1.05rem; color: #8c3a52; margin-bottom: 10px; }
#conflict-list {
  max-height: 220px; overflow-y: auto; margin: 12px 0;
  border: 1px solid #f0dde3; border-radius: 8px; padding: 10px 14px;
  font-size: 0.88rem; line-height: 1.8; color: #3d2b35;
}
.conflict-item { padding: 6px 0; border-bottom: 1px solid #f5e8eb; }
.conflict-item:last-child { border-bottom: none; }
.conflict-item strong { color: #8c3a52; }
#conflict-box .modal-actions { margin-top: 18px; }

/* ── POLL STATUS dot ────────────────────────── */
#poll-dot {
  display: inline-block; width: 8px; height: 8px;
  border-radius: 50%; background: #b0c8b0; margin-right: 6px;
  vertical-align: middle; transition: background 0.4s;
}
#poll-dot.active { background: #5aaa6a; }
.modal {
  background: white; border-radius: 18px; padding: 28px;
  width: 460px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 14px 44px rgba(140,58,82,0.22); border: 1px solid #f0dde3;
}
.modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; color: #5a2a3a; }
.modal .ctx { font-size: 0.78rem; color: #8c6070; margin-bottom: 16px; }
.modal label { font-size: 0.82rem; color: #6a4a5a; display: block; margin-bottom: 5px; margin-top: 13px; font-weight: 600; }
.modal select, .modal textarea, .modal input[type=text] {
  width: 100%; padding: 9px 12px; border: 1.5px solid #f0dde3; border-radius: 10px;
  font-size: 0.88rem; font-family: inherit; color: #3d2b35; background: #fdf7f9;
}
.modal select:focus, .modal textarea:focus, .modal input:focus {
  outline: none; border-color: #c97080; box-shadow: 0 0 0 3px rgba(201,112,128,0.12);
}
.modal textarea { resize: vertical; min-height: 68px; }
.modal-actions { display: flex; gap: 8px; margin-top: 22px; justify-content: flex-end; }
.btn-p {

<script>
  setTimeout(function() {
    var el = document.getElementById('loading-overlay');
    if (el && !el.classList.contains('hidden')) {
      el.classList.add('hidden');
      var err = document.getElementById('api-error');
      if (err) err.classList.add('show');
    }
  }, 6000);
</script>

  const lane = tab.lanes.find(l => l.id === laneId);

function getPhaseLabel(cell) {

  return arr.map(i => ({

    cat:      catMap[i.cat] || i.cat,

    dept:     '',

    policyLog:  Array.isArray(i.policyLog) ? i.policyLog : (i.policy ? [{text: i.policy, date: ''}] : []),
  }));

// ── UNDO / REDO ──────────────────────────────────────────────
const MAX_HISTORY = 30;
let _history = [];   // [{issues:[...], procs:{...}}]
let _histIdx  = -1;

function _snapshot() {
  return {
    issues: JSON.parse(JSON.stringify(issues)),
    procs:  JSON.parse(JSON.stringify(customProcs))
  };
}
function _pushHistory() {
  _history = _history.slice(0, _histIdx + 1); // redo 履歴を破棄
  _history.push(_snapshot());
  if (_history.length > MAX_HISTORY) _history.shift();
  _histIdx = _history.length - 1;
  _updateUndoUI();
}
function _updateUndoUI() {
  const btnU = document.getElementById('btn-undo');
  const btnR = document.getElementById('btn-redo');
  const lbl  = document.getElementById('undo-label');
  if (!btnU) return;
  btnU.disabled = (_histIdx <= 0);
  btnR.disabled = (_histIdx >= _history.length - 1);
  const total = _history.length;
  lbl.textContent = total > 1
    ? `履歴 ${_histIdx + 1} / ${total}`
    : '';
}
function _restoreSnapshot(snap) {
  issues      = migrateIssues(JSON.parse(JSON.stringify(snap.issues)));
  customProcs = JSON.parse(JSON.stringify(snap.procs));
  nextId      = issues.length ? Math.max(...issues.map(i => i.id)) + 1 : 1;
  saveIssues();
  saveCustomProcs();
  ['tab-0','tab-1','tab-2'].forEach(id => rendered.delete(id));
  rendered.delete('tab-mgmt');
  const panelId = currentPanelId;
  if (panelId === 'tab-mgmt') { renderIssueTable(); rendered.add('tab-mgmt'); }
  else { renderTab(parseInt(panelId.replace('tab-',''))); rendered.add(panelId); }
  _updateUndoUI();
}
function undo() {
  if (_histIdx <= 0) return;
  _histIdx--;
  _restoreSnapshot(_history[_histIdx]);
}
function redo() {
  if (_histIdx >= _history.length - 1) return;
  _histIdx++;
  _restoreSnapshot(_history[_histIdx]);
}
// キーボードショートカット
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
});

// ── プロセス項目ドラッグ並び替え ──────────────────────────────
let _dragProc = null; // { key, idx }

function procDragStart(e, key, idx) {
  _dragProc = { key, idx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', key + ':' + idx); // Firefox 対応
  setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
}
function procDragEnter(e, key, idx) {
  if (!_dragProc || _dragProc.key !== key || _dragProc.idx === idx) return;
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function procDragOver(e, key, idx) {
  if (!_dragProc || _dragProc.key !== key || _dragProc.idx === idx) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
function procDragLeave(e) {
  // 子要素への移動では発火しない（relatedTarget が自分の子なら無視）
  if (e.currentTarget.contains(e.relatedTarget)) return;
  e.currentTarget.classList.remove('drag-over');
}
function procDrop(e, key, toIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_dragProc || _dragProc.key !== key) return;
  const fromIdx = _dragProc.idx;
  _dragProc = null;
  moveProc(key, fromIdx, toIdx);
}
function procDragEnd(e) {
  // ドラッグ終了時に全 drag-over / dragging をクリア
  document.querySelectorAll('.process-box.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.process-box.dragging').forEach(el => el.classList.remove('dragging'));
  _dragProc = null;
}

function moveProc(key, fromIdx, toIdx) {
  if (fromIdx === toIdx) return;
  _pushHistory();
  const parts   = key.split('-');
  const tabId   = parseInt(parts[0]);
  const laneId  = parts[1];
  const phaseId = parts[2];
  const tab     = TABS.find(t => t.id === tabId);
  if (!tab) return;

  if (!(key in customProcs)) {
    customProcs[key] = [...(tab.processes[`${laneId}-${phaseId}`] || [])];
  }
  const procs = customProcs[key];
  const [item] = procs.splice(fromIdx, 1);
  procs.splice(toIdx, 0, item);

  // procIdx の更新
  issues.forEach(i => {
    if (i.cell !== key || i.procIdx == null) return;
    const old = i.procIdx;
    if (old === fromIdx)                              { i.procIdx = toIdx; return; }
    if (fromIdx < toIdx && old > fromIdx && old <= toIdx) i.procIdx = old - 1;
    if (fromIdx > toIdx && old >= toIdx && old < fromIdx) i.procIdx = old + 1;
  });

  saveCustomProcs();
  saveIssues();
  rendered.delete(`tab-${tabId}`);
  renderTab(tabId);
}

// ── API 保存 ─────────────────────────────────────────────────
async function _apiPost(type, data) {
  if (!API_URL) return;
  showSaveStatus('saving');
  try {
    await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({ type, data })
    });
    showSaveStatus('saved');
    _syncedSnapshot = JSON.stringify(issues); // 保存成功時にスナップショット更新
  } catch (e) {
    showSaveStatus('error');
  }
}

function saveIssues()      { _cacheIssues(); _apiPost('issues', issues); }
function saveCustomProcs() { _cacheProcs();  _apiPost('procs',  customProcs); }

// ── 自動ポーリング（30秒ごと） ────────────────────────────────
const POLL_MS = 30000;
let _syncedSnapshot = ''; // 最後にサーバーと同期した時点の issues JSON
let _pendingServerData = null;

function _isAnyModalOpen() {
  return [...document.querySelectorAll('.overlay, #conflict-overlay')]
    .some(el => el.classList.contains('open'));
}

async function pollServer() {
  if (!API_URL || _isAnyModalOpen()) return;
  try {
    const res  = await fetch(API_URL + '?_=' + Date.now());
    const data = await res.json();
    const serverJson = JSON.stringify(data.issues || []);

    if (serverJson === _syncedSnapshot) return; // 変化なし

    const serverIssues = migrateIssues(data.issues || []);
    const conflicts    = _detectConflicts(serverIssues);

    // ポーリングドット点灯
    const dot = document.getElementById('poll-dot');
    if (dot) { dot.classList.add('active'); setTimeout(() => dot.classList.remove('active'), 1200); }

    if (conflicts.length > 0) {
      _pendingServerData = { issues: serverIssues, procs: data.customProcs || {} };
      _showConflictDialog(conflicts);
    } else {
      _applyServerData(serverIssues, data.customProcs || {}, serverJson);
    }
  } catch(e) { /* ネットワークエラーは無視 */ }
}

function _applyServerData(serverIssues, serverProcs, serverJson) {
  issues      = serverIssues;
  customProcs = serverProcs;
  nextId      = issues.length ? Math.max(...issues.map(i => i.id)) + 1 : 1;
  _syncedSnapshot = serverJson || JSON.stringify(serverIssues);
  _cacheIssues(); _cacheProcs();
  rerender();
}

// ── 競合検知 ─────────────────────────────────────────────────
function _detectConflicts(serverIssues) {
  if (!_syncedSnapshot) return []; // 初回同期前は競合なし
  const syncedMap = new Map(JSON.parse(_syncedSnapshot).map(i => [i.id, i]));
  const localMap  = new Map(issues.map(i => [i.id, i]));
  const serverMap = new Map(serverIssues.map(i => [i.id, i]));
  const conflicts = [];

  for (const [id, srv] of serverMap) {
    const synced = syncedMap.get(id);
    const local  = localMap.get(id);
    if (!synced || !local) continue;
    const srvChanged   = JSON.stringify(srv)    !== JSON.stringify(synced);
    const localChanged = JSON.stringify(local)  !== JSON.stringify(synced);
    if (srvChanged && localChanged) conflicts.push({ id, local, server: srv });
  }
  return conflicts;
}

function _showConflictDialog(conflicts) {
  const list = document.getElementById('conflict-list');
  list.innerHTML = conflicts.map(c => `
    <div class="conflict-item">
      <strong>課題 #${c.id}</strong>：${escHtml(c.local.text)}<br>
      <span style="color:#5a7a5a">　サーバー：${escHtml(c.server.text)}</span><br>
      <span style="color:#7a5a5a">　あなた：${escHtml(c.local.text)}</span>
    </div>`).join('');
  document.getElementById('conflict-overlay').classList.add('open');
}

function resolveConflict(choice) {
  document.getElementById('conflict-overlay').classList.remove('open');
  if (!_pendingServerData) return;
  if (choice === 'server') {
    _applyServerData(_pendingServerData.issues, _pendingServerData.procs, JSON.stringify(_pendingServerData.issues));
  } else {
    // ローカル優先 — スナップショットだけ更新してサーバーに上書き保存
    _syncedSnapshot = JSON.stringify(issues);
    saveIssues();
  }
  _pendingServerData = null;
}

// 起動時データ読み込み
async function initData() {
  const hideLoading = () => document.getElementById('loading-overlay').classList.add('hidden');

  if (!API_URL) {
    _loadCache();
    document.getElementById('api-error').classList.add('show');
    hideLoading();
    return;
  }

  // 8秒でタイムアウト（APIが応答しない場合のフォールバック）
  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 8000);

  try {
    const res  = await fetch(API_URL, { signal: controller.signal });
    clearTimeout(timeoutId);
    const data = await res.json();
    issues      = migrateIssues(data.issues      || []);
    customProcs = data.customProcs || {};
    if (issues.length === 0) issues = JSON.parse(JSON.stringify(SAMPLE_ISSUES));
    nextId = issues.length ? Math.max(...issues.map(i => i.id)) + 1 : 1;
    _syncedSnapshot = JSON.stringify(issues);
    _cacheIssues(); _cacheProcs();
  } catch (e) {
    clearTimeout(timeoutId);
    _loadCache();
    document.getElementById('api-error').classList.add('show');
  }
  // 初期スナップショットを履歴に積む（undo の「最初の状態」）
  _history = [_snapshot()];
  _histIdx  = 0;
  _updateUndoUI();
  hideLoading();
  setInterval(pollServer, POLL_MS);
}

function getProcs(tabId, laneId, phaseId) {
  const key = `${tabId}-${laneId}-${phaseId}`;
  if (key in customProcs) return customProcs[key];
  const tab = TABS.find(t => t.id === tabId);
  return tab ? (tab.processes[`${laneId}-${phaseId}`] || []) : [];
}

let filters = { timing:'', gyoumu:'', rel:'', cat:'', detail:'', dept:'', status:'' };

function setFilter(key, value) { filters[key] = value; applyFilters(); }

function applyFilters() {
  document.querySelectorAll('.mgmt-table tbody tr').forEach(row => {
    const issue = issues.find(i => i.id === parseInt(row.dataset.iid));
    if (!issue) { row.style.display = ''; return; }
    const timing = issue.timing || getTimingFromCell(issue.cell);
    const dept   = issue.dept   || getDeptFromCell(issue.cell);
    let show = true;
    const gyoumu = getPhaseLabel(issue.cell);
    const rel    = getLaneLabelFromCell(issue.cell);
    if (filters.timing && timing   !== filters.timing)                      show = false;
    if (filters.gyoumu && gyoumu   !== filters.gyoumu)                      show = false;
    if (filters.rel    && rel      !== filters.rel)                         show = false;
    if (filters.cat    && issue.cat !== filters.cat)                        show = false;
    if (filters.dept   && !(issue.depts||[]).includes(filters.dept))        show = false;
    if (filters.status   && issue.status       !== filters.status)        show = false;
    if (filters.detail   && !issue.text.includes(filters.detail))         show = false;
    row.style.display = show ? '' : 'none';
  });
}

function restoreFilters() {
  const map = { timing:'ft-tim', gyoumu:'ft-gym', rel:'ft-rel', cat:'ft-cat', detail:'ft-det', dept:'ft-dep', status:'ft-st' };
  Object.entries(map).forEach(([k, id]) => {
    const el = document.getElementById(id);
    if (el) el.value = filters[k] || '';
  });
}

  const cat    = CATS[issue.cat] || CATS.lang;
  const timing = issue.timing || getTimingFromCell(issue.cell);
  const dept   = issue.dept   || getDeptFromCell(issue.cell);

  document.getElementById('dp-meta').innerHTML =
    `<span>${escHtml(timing)}</span><span>${escHtml(dept)}</span><span>${cat.label}</span>`;
  document.getElementById('dp-issue-text').textContent = issue.text;

  const log = issue.policyLog || [];
  const listEl = document.getElementById('dp-log-list');
  if (log.length === 0) {
    listEl.innerHTML = '<div class="dp-empty">対応方針がまだ登録されていません</div>';
  } else {
    listEl.innerHTML = [...log].reverse().map((entry, ri) => {
      const idx = log.length - 1 - ri;
      return `<div class="dp-entry">
        ${entry.dept ? `<span class="dp-entry-dept">${escHtml(entry.dept)}</span>` : ''}
        <div class="dp-entry-date">${entry.date || '日付なし'}</div>
        <div class="dp-entry-text">${escHtml(entry.text)}</div>
        <button class="dp-entry-del" onclick="deletePolicyEntry(${idx})" title="削除">✕</button>
      </div>`;
    }).join('');
  }
}

function savePolicyEntry() {
  const text = document.getElementById('dp-add-text').value.trim();
  if (!text) return;
  const issue = issues.find(i => i.id === _dpIid);
  if (!issue) return;
  _pushHistory();
  if (!Array.isArray(issue.policyLog)) issue.policyLog = [];
  const now  = new Date();
  const date = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const dept = document.getElementById('dp-add-dept').value;
  issue.policyLog.push({ text, date, dept });
  saveIssues();
  document.getElementById('dp-add-text').value = '';
  document.getElementById('dp-add-dept').value = '';
  renderDetailPanel();
}

function deletePolicyEntry(idx) {
  const issue = issues.find(i => i.id === _dpIid);
  if (!issue || !issue.policyLog) return;
  _pushHistory();
  issue.policyLog.splice(idx, 1);
  saveIssues();
  renderDetailPanel();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderChip(issue) {
  const cat = CATS[issue.cat] || CATS.lang;
  const doneCls = issue.status === 'done' ? ' status-done' : '';
  return `<div class="issue-chip cat-${issue.cat}${doneCls}" data-iid="${issue.id}" onclick="openEditChip(this)">
    <span class="chip-cat">${cat.label}</span>
    <span class="issue-text">${escHtml(issue.text)}</span>
  </div>`;
}

// 検査セル判定（kango/kensa/housha/ishi の exam フェーズ）
const EXAM_LANES = new Set(['kango', 'kensa', 'housha', 'ishi']);
function isExamCell(tabId, laneId, phaseId) {
  return tabId === 1 && EXAM_LANES.has(laneId) && phaseId === 'exam';
}

// "検査名::手順" 形式のパース
function parseExamProc(text) {
  const sep = text.indexOf('::');
  if (sep === -1) return [text, ''];
  return [text.slice(0, sep), text.slice(sep + 2)];
}

// 検査セル用 横並びレンダリング
function renderExamProcs(procs, cellIssues, key, ctxSafe, pi) {
  let html = '';
  // 検査名ごとにグループ化（順序保持）
  const groupOrder = [];
  const groups = new Map();
  procs.forEach((p, idx) => {
    const [name, step] = parseExamProc(p);
    if (!groups.has(name)) { groups.set(name, []); groupOrder.push(name); }
    groups.get(name).push({ step, idx });
  });

  groupOrder.forEach(name => {
    const steps = groups.get(name);
    html += `<div class="exam-group">`;
    if (name) html += `<div class="exam-group-name">${escHtml(name)}</div>`;
    html += `<div class="exam-steps">`;
    steps.forEach(({ step, idx }, si) => {
      if (si > 0) html += `<span class="proc-arrow-h">→</span>`;
      const label = step || name;
      html += `<div class="process-box proc-${pi}">
        ${escHtml(label)}
        <button class="proc-del-btn" data-cell="${key}" data-idx="${idx}" data-text="${escHtml(procs[idx])}" onclick="deleteProcFromBtn(this)">✕</button>
      </div>`;
      cellIssues.filter(i => i.procIdx === idx).forEach(issue => { html += renderChip(issue); });
      html += `<button class="add-issue-btn" data-cell="${key}" data-ctx="${ctxSafe}" data-pidx="${idx}" onclick="openNewFromBtn(this)">＋ 課題を追加</button>`;
    });
    html += `</div></div>`;
  });
  cellIssues.filter(i => i.procIdx === null || i.procIdx === undefined)
    .forEach(issue => { html += renderChip(issue); });
  return html;
}

function renderTab(tabIdx) {
  const tab       = TABS[tabIdx];
  const container = document.getElementById(`tab-${tabIdx}`);
  const totalSlots = tab.phases.reduce((s, ph) => s + (ph.span||1), 0);
  const slotW      = `calc((100% - 90px) / ${totalSlots})`;

  let html = `<div class="swimlane-wrap"><table class="swimlane"><colgroup><col style="width:90px">`;
  tab.phases.forEach(ph => {
    for (let s = 0; s < (ph.span||1); s++) html += `<col style="width:${slotW}">`;
  });
  html += `</colgroup><thead><tr class="phase-header"><th class="col-lane-th"></th>`;
  tab.phases.forEach((ph, pi) => {
    html += `<th class="ph-${pi}" colspan="${ph.span||1}">${ph.label.replace(/\n/g,'<br>')}</th>`;
  });
  html += `</tr></thead><tbody>`;

  tab.lanes.forEach((lane, laneIdx) => {
    html += `<tr class="lane-row" data-lc="${laneIdx}">
      <td class="lane-label"><span class="lane-icon">${lane.icon}</span>${lane.label.replace(/\n/g,'<br>')}</td>`;
    tab.phases.forEach((ph, pi) => {
      const key        = `${tab.id}-${lane.id}-${ph.id}`;
      const procs      = getProcs(tab.id, lane.id, ph.id);
      const cellIssues = issues.filter(i => i.cell === key);
      const showArrow  = !ph.noArrow;
      const ctxSafe    = escHtml(`${lane.label.replace(/\n/,'')} ／ ${ph.label.replace(/\n/,'')}`);
      const examCell   = isExamCell(tab.id, lane.id, ph.id);

      html += `<td colspan="${ph.span||1}"><div class="cell">`;

      if (examCell) {
        html += renderExamProcs(procs, cellIssues, key, ctxSafe, pi);
      } else if (procs.length === 0) {
        cellIssues.filter(i => i.procIdx === null || i.procIdx === undefined)
          .forEach(issue => { html += renderChip(issue); });
        html += `<button class="add-issue-btn" data-cell="${key}" data-ctx="${ctxSafe}" data-pidx="null" onclick="openNewFromBtn(this)">＋ 課題を追加</button>`;
      } else {
        procs.forEach((p, idx) => {
          if (idx > 0 && showArrow) html += `<div class="proc-arrow">↓</div>`;
          html += `<div class="process-box proc-${pi}" draggable="true"
            ondragstart="procDragStart(event,'${key}',${idx})"
            ondragenter="procDragEnter(event,'${key}',${idx})"
            ondragover="procDragOver(event,'${key}',${idx})"
            ondragleave="procDragLeave(event)"
            ondrop="procDrop(event,'${key}',${idx})"
            ondragend="procDragEnd(event)">
            <span class="proc-grab">⠿</span><span class="proc-label">${escHtml(p)}</span>
            <button class="proc-del-btn" data-cell="${key}" data-idx="${idx}" data-text="${escHtml(p)}"
              ondragstart="event.stopPropagation()" onclick="deleteProcFromBtn(this)">✕</button>
          </div>`;
          cellIssues.filter(i => i.procIdx === idx).forEach(issue => { html += renderChip(issue); });
          html += `<button class="add-issue-btn" data-cell="${key}" data-ctx="${ctxSafe}" data-pidx="${idx}" onclick="openNewFromBtn(this)">＋ 課題を追加</button>`;
        });
        cellIssues.filter(i => i.procIdx === null || i.procIdx === undefined)
          .forEach(issue => { html += renderChip(issue); });
      }
      html += `<button class="add-proc-btn" data-cell="${key}" data-ctx="${ctxSafe}" onclick="openAddProcFromBtn(this)">＋ 業務を追加</button>`;
      html += `</div></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  container.innerHTML = html;
}

function switchTab(btnIdx) {
  const panelId = TAB_PANEL_ID[btnIdx];

  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === panelId);

  const isSwimlane = panelId !== 'tab-mgmt';

    if (panelId === 'tab-mgmt') renderIssueTable();

    rendered.add(panelId);
  }
}

let isIssueMode = false, isProcMode = false;

function toggleMode() {
  isIssueMode = !isIssueMode;

  document.body.classList.toggle('issue-mode', isIssueMode);

function toggleProcMode() {

  document.body.classList.toggle('proc-mode', isProcMode);

  const b = document.getElementById('toggleProcMode');

  const b = document.getElementById('toggleMode');

function rerender() {
  rendered.delete(currentPanelId);
  if (currentPanelId === 'tab-mgmt') { renderIssueTable(); }
  else { renderTab(parseInt(currentPanelId.replace('tab-',''))); }
  rendered.add(currentPanelId);
  // Invalidate all others
  [...rendered].forEach(id => { if (id !== currentPanelId) rendered.delete(id); });
}

function closeProcModal() { document.getElementById('proc-overlay').classList.remove('open'); }
function closeExamProcModal() { document.getElementById('exam-proc-overlay').classList.remove('open'); }
function saveProc() {
  const text = document.getElementById('procModalText').value.trim();
  if (!text) { document.getElementById('procModalText').focus(); return; }
  _pushHistory();
  const tabId = parseInt(addProcKey.split('-')[0]);

  }
  customProcs[addProcKey].push(text);
  saveCustomProcs(); closeProcModal(); rerender();
}
function saveExamProc() {
  const name = document.getElementById('examProcName').value.trim();
  const step = document.getElementById('examProcStep').value.trim();
  if (!name) { document.getElementById('examProcName').focus(); return; }
  _pushHistory();
  const text  = step ? `${name}::${step}` : `${name}::`;
  const tabId = parseInt(addProcKey.split('-')[0]);
  const rest  = addProcKey.slice(addProcKey.indexOf('-') + 1);
  if (!(addProcKey in customProcs)) {
    const tab = TABS.find(t => t.id === tabId);
    customProcs[addProcKey] = [...(tab ? (tab.processes[rest]||[]) : [])];
  }
  customProcs[addProcKey].push(text);
  saveCustomProcs(); closeExamProcModal(); rerender();
}
function deleteProcFromBtn(btn) {
  const cellKey = btn.dataset.cell, idx = parseInt(btn.dataset.idx);
  showConfirm(`「${btn.dataset.text}」を削除しますか？`, () => {
    _pushHistory();

      const tab = TABS.find(t => t.id === tabId);
      customProcs[cellKey] = [...(tab ? (tab.processes[rest]||[]) : [])];
    }
    customProcs[cellKey].splice(idx, 1);
    saveCustomProcs(); rerender();
  });
}

function updateStatus(id, status) {
  const iid   = parseInt(id);
  const issue = issues.find(i => i.id === iid);
  if (!issue) return;
  issue.status = status; saveIssues();
  const row = document.querySelector(`tr[data-iid="${iid}"]`);
  if (row) {
    row.className = status === 'done' ? 'status-done' : '';
    const det = row.querySelector('.col-detail');
    if (det) det.innerHTML = status==='done' ? `<s>${escHtml(issue.text)}</s>` : escHtml(issue.text);
  }
  // Invalidate swimlane tabs
  ['tab-0','tab-1','tab-2'].forEach(id => rendered.delete(id));
}
function updateField(id, field, value) {
  const issue = issues.find(i => i.id === parseInt(id));
  if (issue) { issue[field] = value; saveIssues(); }
}

let mgmtEditingId = null;
function openMgmtAdd() {
  mgmtEditingId = null;
  document.getElementById('mgmtTitle').textContent    = '課題を追加';
  document.getElementById('mgmtTiming').value         = '健診前';
  document.getElementById('mgmtDept').value           = '受診者';
  document.getElementById('mgmtCat').value            = 'lang';
  document.getElementById('mgmtText').value           = '';
  document.getElementById('mgmtPolicy').value         = '';
  document.getElementById('mgmtAssignee').value       = '';
  document.getElementById('mgmtStatus').value         = 'open';
  document.getElementById('mgmtMemo').value           = '';
  document.getElementById('mgmtBtnDel').style.display = 'none';
  document.getElementById('mgmt-overlay').classList.add('open');
  setTimeout(() => document.getElementById('mgmtText').focus(), 50);
}
function openMgmtEdit(id) {
  const issue = issues.find(i => i.id === parseInt(id));
  if (!issue) return;
  mgmtEditingId = issue.id;
  document.getElementById('mgmtTitle').textContent    = '課題を編集';
  document.getElementById('mgmtTiming').value         = issue.timing   || getTimingFromCell(issue.cell) || '健診前';
  document.getElementById('mgmtDept').value           = issue.dept     || getDeptFromCell(issue.cell)   || '受診者';
  document.getElementById('mgmtCat').value            = issue.cat;
  document.getElementById('mgmtText').value           = issue.text;
  document.getElementById('mgmtPolicy').value         = issue.policy   || '';
  document.getElementById('mgmtAssignee').value       = issue.assignee || '';
  document.getElementById('mgmtStatus').value         = issue.status   || 'open';
  document.getElementById('mgmtMemo').value           = issue.memo     || '';
  document.getElementById('mgmtBtnDel').style.display = 'inline-block';
  document.getElementById('mgmt-overlay').classList.add('open');
}
function closeMgmtModal() { document.getElementById('mgmt-overlay').classList.remove('open'); }
function saveMgmtIssue() {
  const text = document.getElementById('mgmtText').value.trim();
  if (!text) { document.getElementById('mgmtText').focus(); return; }
  const cat      = document.getElementById('mgmtCat').value;
  const timing   = document.getElementById('mgmtTiming').value;
  const dept     = document.getElementById('mgmtDept').value;
  const status   = document.getElementById('mgmtStatus').value;
  const memo     = document.getElementById('mgmtMemo').value.trim();
  const policy   = document.getElementById('mgmtPolicy').value.trim();
  const assignee = document.getElementById('mgmtAssignee').value.trim();
  if (mgmtEditingId === null) {
    issues.push({ id:nextId++, cell:null, procIdx:null, cat, text, note:'', policy, assignee, timing, dept, status, memo });
  } else {
    const issue = issues.find(i => i.id === mgmtEditingId);
    if (issue) Object.assign(issue, { cat, text, policy, assignee, timing, dept, status, memo });
  }
  saveIssues(); closeMgmtModal();
  ['tab-0','tab-1','tab-2'].forEach(id => rendered.delete(id));
  renderIssueTable(); rendered.add('tab-mgmt');
}
function deleteMgmtFromModal() {
  showConfirm('この課題を削除しますか？', () => {
    issues = issues.filter(i => i.id !== mgmtEditingId);
    saveIssues(); closeMgmtModal();
    ['tab-0','tab-1','tab-2'].forEach(id => rendered.delete(id));
    renderIssueTable(); rendered.add('tab-mgmt');
  });
}
function deleteMgmtRow(id) {
  const iid   = parseInt(id);
  const issue = issues.find(i => i.id === iid);
  const label = issue ? `「${issue.text.slice(0,22)}${issue.text.length>22?'…':''}」` : 'この課題';
  showConfirm(`${label}を削除しますか？`, () => {
    issues = issues.filter(i => i.id !== iid);
    saveIssues();
    ['tab-0','tab-1','tab-2'].forEach(id => rendered.delete(id));
    renderIssueTable(); rendered.add('tab-mgmt');
  });
}
document.getElementById('mgmt-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('mgmt-overlay')) closeMgmtModal();
});

// ============================================================
// INIT
// ============================================================
initData().then(() => {
  renderIssueTable();
  rendered.add('tab-mgmt');
});
</script>
